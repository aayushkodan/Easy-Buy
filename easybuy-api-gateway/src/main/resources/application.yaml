server:
  port: 8080

spring:
  application:
    name: easybuy-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      access: read_only


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.aayush.productservice: DEBUG